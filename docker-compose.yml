# Phonix — full stack (ASP.NET Core API + Next.js storefront) on a single host.
# Config comes from a sibling .env file (copy .env.example → .env and edit before first run).
#   docker compose up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: phonix-backend
    container_name: phonix-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5228
      # Public URL of the storefront — used for CORS, email links, and the verify/reset URLs.
      PHONIX_FRONTEND_URL: ${PHONIX_FRONTEND_URL:-http://localhost:3000}
      # store.json + logs land under the mounted volume so state survives rebuilds.
      PHONIX_DATA_FILE: /app/App_Data/store.json
      PHONIX_LOG_DIR: /app/App_Data/logs
      # Set both to "true" only when a TLS-terminating reverse proxy sits in front (see DEPLOY.md).
      PHONIX_BEHIND_PROXY: ${PHONIX_BEHIND_PROXY:-false}
      PHONIX_FORCE_HTTPS: ${PHONIX_FORCE_HTTPS:-false}
    volumes:
      - phonix-data:/app/App_Data
    ports:
      - "${BACKEND_PORT:-5228}:5228"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5228/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time — must be the PUBLIC API URL the browser reaches.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5228}
    image: phonix-frontend
    container_name: phonix-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  phonix-data:
